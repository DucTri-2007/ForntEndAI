<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form đăng ký</title>
</head>
<body>
    <form>
        <table cellpadding="8" style="border: 1px solid black; width: 450px;">
            <tr>
                <td><label for="name">Enter name:</label></td>
                <td><input type="text" id="name"></td>
            </tr>
            <tr>
                <td><label for="password">Enter password:</label></td>
                <td><input type="password" id="password"></td>
            </tr>
            <tr>
                <td><label for="email">Enter email:</label></td>
                <td><input type="email" id="email"></td>
            </tr>
            <tr>
                <td><label>Enter Gender:</label></td>
                <td>
                    <input type="radio" id="male" name="gt" value="male">
                    <label for="male">male</label>
                    <input type="radio" id="female" name="gt" value="female">
                    <label for="female">female</label>
                </td>
            </tr>
            <tr>
                <td><label for="country">Select Country:</label></td>
                <td>
                    <select id="country">
                        <option value="india" selected>india</option>
                        <option value="vietnam">vietnam</option>
                        <option value="usa">usa</option>
                        <option value="japan">japan</option>
                        <option value="korea">korea</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: right;">
                    <input type="submit" value="register">
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
