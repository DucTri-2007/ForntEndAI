<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Quán Cà Phê</title>
    
    <!-- Nhúng file CSS từ bên ngoài -->
    <link rel="stylesheet" href="ThietKeMenu.css">
</head>
<body>

        <h1>MENU QUÁN CÀ PHÊ</h1>
        
        <!-- ul và li để hiển thị danh sách món -->
        <ul>
            <li>
                <span class="item-name">Capuchino</span> 
                <span class="item-price">30,000đ</span>
            </li>
            <li>
                <span class="item-name">Cà phê sữa</span> 
                <span class="item-price">28,000đ</span>
            </li>
            <li>
                <span class="item-name">Bạc xỉu</span> 
                <span class="item-price">30,000đ</span>
            </li>
            <li>
                <span class="item-name">Cam ép</span> 
                <span class="item-price">25,000đ</span>
            </li>
            <li>
                <span class="item-name">Olong sữa</span> 
                <span class="item-price">28,000đ</span>
            </li>

        <!-- button là Đặt ngay -->
        <button class="order-btn">Đặt ngay</button>
    </div>

</body>
</html>
